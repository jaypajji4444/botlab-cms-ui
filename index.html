<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotLab CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" />

  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #f3f4f6;
    }

    /* Custom Scrollbar for cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Quill Overrides for Tailwind integration */
    .ql-container.ql-snow {
      border-bottom-left-radius: 0.75rem;
      border-bottom-right-radius: 0.75rem;
      border-color: #e5e7eb;
      font-family: "Inter", sans-serif;
    }

    .ql-toolbar.ql-snow {
      border-top-left-radius: 0.75rem;
      border-top-right-radius: 0.75rem;
      border-color: #e5e7eb;
      background-color: #f9fafb;
    }

    .quill {
      display: flex;
      flex-direction: column;
    }

    .ql-container.ql-snow {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .ql-editor {
      min-height: 100px;
      flex: 1;
      overflow-y: auto;
      font-size: 1rem;
      line-height: 1.6;
    }

    .ql-editor h1 {
      font-size: 2em;
      font-weight: bold;
    }

    .ql-editor h2 {
      font-size: 1.5em;
      font-weight: bold;
    }

    /* TipTap Editor Styles */
    .tiptap-blog-editor {
      min-height: 400px;
      font-size: 1rem;
      line-height: 1.7;
    }

    .tiptap-blog-editor h1 {
      font-size: 2em;
      font-weight: 700;
      margin-top: 1em;
      margin-bottom: 0.5em;
      line-height: 1.2;
    }

    .tiptap-blog-editor h2 {
      font-size: 1.5em;
      font-weight: 700;
      margin-top: 0.8em;
      margin-bottom: 0.4em;
      line-height: 1.3;
    }

    .tiptap-blog-editor h3 {
      font-size: 1.25em;
      font-weight: 600;
      margin-top: 0.6em;
      margin-bottom: 0.3em;
      line-height: 1.4;
    }

    .tiptap-blog-editor img {
      max-width: 100%;
      height: auto;
      border-radius: 0.5rem;
      margin: 1rem 0;
    }

    .tiptap-blog-editor table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      table-layout: fixed;
      overflow: hidden;
    }

    .tiptap-blog-editor th,
    .tiptap-blog-editor td {
      border: 1px solid #d1d5db;
      padding: 0.5rem 0.75rem;
      vertical-align: top;
      position: relative;
      min-width: 80px;
    }

    .tiptap-blog-editor th {
      background-color: #f3f4f6;
      font-weight: 600;
      text-align: left;
    }

    .tiptap-blog-editor .selectedCell {
      background-color: #dbeafe;
    }

    .tiptap-blog-editor p {
      margin-bottom: 0.5em;
    }

    .tiptap-blog-editor ul,
    .tiptap-blog-editor ol {
      padding-left: 1.5em;
      margin: 0.5em 0;
    }

    .tiptap-blog-editor ul {
      list-style-type: disc;
    }

    .tiptap-blog-editor ol {
      list-style-type: decimal;
    }

    .tiptap-blog-editor li {
      margin-bottom: 0.25em;
    }
  </style>

  <link rel="stylesheet" href="/index.css" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
